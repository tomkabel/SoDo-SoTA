name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  invariants:
    name: Repository invariants
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.2.2, pinned by commit SHA (sota-devsecops).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install invariant-check dependencies
        run: python3 -m pip install --disable-pip-version-check --quiet PyYAML==6.0.2
      - name: Test invariant checker
        run: python3 -m unittest scripts/test_check_invariants.py
      - name: Check invariants
        run: ./scripts/check-invariants.sh

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          VERSION=8.30.0
          TARBALL="gitleaks_${VERSION}_linux_x64.tar.gz"
          SHA256=79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e
          curl -fsSL -o "$TARBALL" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${TARBALL}"
          echo "${SHA256}  ${TARBALL}" | sha256sum -c -
          tar -xzf "$TARBALL" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan
        run: gitleaks detect --no-git --config .gitleaks.toml --redact --verbose
